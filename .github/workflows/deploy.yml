name: Build & Deploy KolbacoffProject to GitHub Pages

on:
  push:
    branches:
      - main  # Запуск при пуше в main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Устанавливаем Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: npm install

      # 4. Создаем папку для сборки
      - name: Prepare dist folder
        run: |
          rm -rf dist
          mkdir -p dist

      # 5. Собираем JS с ESBuild
      - name: Build JavaScript
        run: npx esbuild script.js --bundle --outfile=dist/script.js --minify

      # 6. Копируем все HTML, CSS, Supabase и статические ресурсы
      - name: Copy static files
        run: |
          cp index.html dist/
          cp booking.html dist/
          cp style.css dist/
          cp supabase.js dist/
          cp -r images dist/
          cp -r docs dist/

      # 7. Деплой на GitHub Pages автоматически
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          user_name: 'github-actions'
          user_email: 'github-actions@github.com'
