 <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Font Awesome (только один) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <!-- HEADER - ТОЧНАЯ КОПИЯ ИЗ INDEX.HTML -->
<header class="header">
  <div class="container">
    <a href="index.html" class="logo">Колбасoff<span>· by Danila Kolbasenko</span></a>
    <nav class="nav">
      <div class="mobile-menu-toggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <a href="index.html#about" class="nav-link">О нас</a>
      <a href="index.html#menu" class="nav-link">Меню</a>
      <a href="booking.html" class="nav-link active">Бронирование</a>
      <a href="index.html#team" class="nav-link">Команда</a>
      <a href="index.html#reviews" class="nav-link">Отзывы</a>
      <a href="index.html#contacts" class="nav-link">Контакты</a>
    </nav>
  </div>
</header>

  <!-- ТОЧНАЯ КОПИЯ БЛОКА БРОНИРОВАНИЯ ИЗ INDEX.HTML -->
  <main>
    <section class="booking" id="booking">
      <div class="container">
        <div class="booking-header">
          <h2>Забронируйте стол</h2>
          <p>Онлайн-бронирование доступно за 2 часа до посещения. Для больших компаний звоните +7 (343) 288-88-55</p>
        </div>
        
        <form class="booking-form">
          <div class="form-row">
            <div class="form-group">
              <label>Имя</label>
              <input type="text" placeholder="Введите ваше имя" required>
            </div>
            <div class="form-group">
              <label>Телефон</label>
              <input type="tel" placeholder="+7 (___) ___-__-__" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>Количество гостей</label>
              <select required>
                <option value="">Выберите количество</option>
                <option value="1">1 гость</option>
                <option value="2">2 гостя</option>
                <option value="3">3 гостя</option>
                <option value="4">4 гостя</option>
                <option value="5+">5+ гостей</option>
              </select>
            </div>
            <div class="form-group">
              <label>Дата</label>
              <input type="date" required>
            </div>
          </div>
          
          <div class="form-row">
            <div class="form-group full-width">
              <label>Время</label>
              <select required>
                <option value="">Выберите время</option>
                <option value="14:00">14:00</option>
                <option value="15:00">15:00</option>
                <option value="16:00">16:00</option>
                <option value="17:00">17:00</option>
                <option value="18:00">18:00</option>
                <option value="19:00">19:00</option>
                <option value="20:00">20:00</option>
                <option value="21:00">21:00</option>
                <option value="22:00">22:00</option>
                <option value="23:00">23:00</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label>Дополнительно</label>
            <textarea placeholder="Аллергия, пожелания к столу, особые запросы..." rows="3"></textarea>
          </div>
          
          <button type="submit" class="btn btn--larger">Забронировать стол</button>
        </form>
      </div>
</section> 
  </main>

</body>
</html>
